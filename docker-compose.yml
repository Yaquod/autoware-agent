networks:
  autoware_net:
    driver: bridge

services:
  autoware_bridge:
    build:
      context: .
      dockerfile: autoware_bridge.Dockerfile
    container_name: autoware_bridge
    volumes:
      - ./gateway_bridge:/autoware/src/gateway_bridge
      - ./autoware_map:/autoware/map
    ports:
      - "50052:50051"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - autoware_net
    command: >
      bash -c "
      source /opt/autoware/setup.bash &&
      cd /autoware &&
      colcon build --symlink-install --packages-select gateway_bridge &&
      source install/setup.bash &&
      ros2 run gateway_bridge gateway_bridge_node --ros-args -p carla_host:=host.docker.internal -p carla_port:=2000 -p grpc_port:=50051
      "

  grpc_client:
    platform: linux/amd64
    build:
      context: .
      dockerfile: carla_scene_manager/Dockerfile
    container_name: grpc_client
    networks:
      - autoware_net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - GRPC_HOST=autoware_bridge
      - GRPC_PORT=50051
      - CARLA_HOST=host.docker.internal
      - CARLA_PORT=2000
    depends_on:
      autoware_bridge:
        condition: service_started
    restart: on-failure
    command: >
      bash -c "sleep 30 && python carla_scene_manager.py"