# docker-compose.edge.yaml
# -------------------------
# Runs on the NVIDIA Jetson edge device. It ONLY pulls images (both are built and
# pushed off-edge to ghcr.io/yaquod, including autoware_data baked into the
# `autoware` image itself -- see docker/Dockerfile.autoware-data) and runs the
# full Autoware stack plus the vehicle_autoware_agent bridge.
#
#   autoware        -> the fork image, full autonomous stack + baked-in model data
#   autoware_agent  -> the agent bridge, built FROM the same base (shared layers)
#
# Both run on the host network + a shared ROS_DOMAIN_ID so the agent's ROS 2
# nodes discover Autoware over DDS. Only the vehicle-specific map is mounted
# (never baked into images, since it differs per deployment site); the
# perception model data is baked in, since it's identical across every
# deployment and the edge shouldn't depend on a live connection for it.
#
# Prereqs on the Jetson:
#   - JetPack with Docker + nvidia-container-runtime installed
#   - `docker login ghcr.io`
#   - a filled-in .env next to this file (see .env.example)
#
# Usage:
#   docker compose -f docker/docker-compose.edge.yaml --env-file docker/.env pull
#   docker compose -f docker/docker-compose.edge.yaml --env-file docker/.env up -d
services:
  autoware:
    image: ${AUTOWARE_IMAGE:-ghcr.io/yaquod/autoware:universe-cuda}
    container_name: autoware
    runtime: nvidia
    network_mode: host
    ipc: host
    pid: host
    stop_grace_period: 30s
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=0
      - RCUTILS_COLORIZED_OUTPUT=1
    volumes:
      # Vehicle-specific map (large) -- mounted, not baked into the image.
      - ${MAP_PATH:?set MAP_PATH in .env}:/autoware_map:ro
      # DDS shared-memory / X for any visualization (optional).
      - /dev/shm:/dev/shm
      # NOTE: no autoware_data mount here anymore -- it's baked into the
      # image by docker/Dockerfile.autoware-data during the off-edge build.
    command:
      - /bin/bash
      - -lc
      - >
        source /opt/ros/humble/setup.bash &&
        source /opt/autoware/setup.bash &&
        ros2 launch autoware_launch ${AUTOWARE_LAUNCH:-autoware.launch.xml}
        map_path:=/autoware_map
        vehicle_model:=${VEHICLE_MODEL:-sample_vehicle}
        sensor_model:=${SENSOR_MODEL:-sample_sensor_kit}
        rviz:=false
  autoware_agent:
    image: ${AGENT_IMAGE:-ghcr.io/yaquod/autoware-agent:latest}
    container_name: autoware_agent
    depends_on:
      - autoware
    network_mode: host
    ipc: host
    stop_grace_period: 15s
    restart: unless-stopped
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=0
      - GATEWAY_ADDR=${GATEWAY_ADDR:-}
    volumes:
      - ${AGENT_CONFIG_DIR:-./agent-config}:/opt/agent/config:ro
